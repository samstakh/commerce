{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}Auctions{% endblock %}</title>
        <link href="{% static 'auctions/styles.css' %}" rel="stylesheet">
    </head>
    <body>
        <nav class="site-nav">
            <div class="nav-inner">
                <a class="nav-brand" href="{% url 'index' %}">Auctions</a>
                <ul class="nav-links">
                    <li><a href="{% url 'index' %}">Home</a></li>
                    <li><a href="{% url 'activeList' %}">Listings</a></li>
                    <li><a href="{% url 'category_view' %}">Categories</a></li>
                    {% if user.is_authenticated %}
                        <li><a href="{% url 'watchlist' %}">Watchlist</a></li>
                        <li><a href="{% url 'addListing' %}">Sell</a></li>
                        <li><a href="{% url 'logout' %}">Log Out</a></li>
                        <span class="nav-user">Signed in as <strong>{{ user.username }}</strong></span>
                    {% else %}
                        <li><a href="{% url 'login' %}">Log In</a></li>
                        <li><a href="{% url 'register' %}">Register</a></li>
                    {% endif %}
                </ul>
            </div>
        </nav>
        <main class="main-container">
            {% block body %}{% endblock %}
        </main>
    </body>
</html>
