{% extends "auctions/layout.html" %}

{% block body %}
    <div class="form-center">
    <div class="form-wrap">
        <div class="page-header">
            <h1 class="page-heading page-heading--md">Register</h1>
            <p class="page-subtitle">Create your account.</p>
        </div>

        {% if message %}
            <div class="form-error">{{ message }}</div>
        {% endif %}

        <form action="{% url 'register' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input class="form-input" autofocus type="text" name="username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" type="email" name="email" placeholder="Your email address">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" type="password" name="password" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input class="form-input" type="password" name="confirmation" placeholder="Confirm your password">
            </div>
            <button class="btn btn--primary btn--full" type="submit">Register</button>
        </form>

        <p class="form-footer">Already have an account? <a href="{% url 'login' %}">Log in here.</a></p>
    </div>
    </div>
{% endblock %}
