{% extends "auctions/layout.html" %}

{% block body %}
    <div class="form-center">
    <div class="form-wrap">
        <div class="page-header">
            <h1 class="page-heading page-heading--md">Log In</h1>
            <p class="page-subtitle">Welcome back.</p>
        </div>

        {% if message %}
            <div class="form-error">{{ message }}</div>
        {% endif %}

        <form action="{% url 'login' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input autofocus class="form-input" type="text" name="username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" type="password" name="password" placeholder="Enter your password">
            </div>
            <button class="btn btn--primary btn--full" type="submit">Log In</button>
        </form>

        <p class="form-footer">Don't have an account? <a href="{% url 'register' %}">Register here.</a></p>
    </div>
    </div>
{% endblock %}
