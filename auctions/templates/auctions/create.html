{% extends "auctions/layout.html" %}

{% block body %}
    <div class="form-wrap form-wrap--wide">
        <div class="page-header">
            <h1 class="page-heading page-heading--md">Create a <em>Listing</em></h1>
            <p class="page-subtitle">List an item for auction.</p>
        </div>

        {% if error %}
            <div class="form-error">{{ error }}</div>
        {% endif %}

        <form action="{% url 'addListing' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Title</label>
                <input class="form-input" type="text" name="title" placeholder="What are you selling?">
            </div>
            <div class="form-group">
                <label class="form-label">Starting Price</label>
                <input class="form-input" type="text" name="price" placeholder="0.00">
            </div>
            <div class="form-group">
                <label class="form-label">Image URL (optional)</label>
                <input class="form-input" type="text" name="image" placeholder="https://...">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-input" name="Content" placeholder="Describe your item..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-input" name="category">
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="books">Books</option>
                    <option value="home">Home & Living</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="other" selected>Other</option>
                </select>
            </div>
            <button class="btn btn--primary btn--full" type="submit">Create Listing</button>
        </form>
    </div>
{% endblock %}
