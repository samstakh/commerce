{% extends "auctions/layout.html" %}

{% block body %}
    <div class="page-header">
        <h1 class="page-heading page-heading--lg">Browse by <em>Category</em></h1>
        <p class="page-subtitle">Find exactly what you're looking for.</p>
    </div>

    <div class="cat-grid">
        {% for key, name in categories %}
            <a href="{% url 'category_listings' key %}" class="cat-card">{{ name }}</a>
        {% endfor %}
    </div>
{% endblock %}
